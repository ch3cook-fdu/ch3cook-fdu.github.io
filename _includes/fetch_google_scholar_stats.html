<script>
    $(document).ready(function () {
        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/'
        {% endif %}
        $.ajax({
            url: gsDataBaseUrl + "google-scholar-stats/gs_data.json",
            dataType: 'json',
            cache: false,
            success: function (data) {
                var totalEle = document.getElementById('total_cit');
                if (totalEle) { totalEle.innerHTML = data['citedby']; }
                var pubs = data['publications'] || {};
                var citationEles = document.getElementsByClassName('show_paper_citations')
                Array.prototype.forEach.call(citationEles, element => {
                    var paperId = element.getAttribute('data')
                    var pub = pubs[paperId];
                    if (pub && pub['num_citations'] !== undefined) {
                        element.innerHTML = '<span class="cit-sep"> | </span>Citations: ' + pub['num_citations'];
                    }
                });
            }
        });
    })
</script>
